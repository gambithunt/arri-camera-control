<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
		
		<!-- PWA Configuration -->
		<link rel="manifest" href="/manifest.json" />
		<meta name="theme-color" content="#E31E24" />
		<meta name="background-color" content="#1A1A1A" />
		
		<!-- iOS PWA Configuration -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="ARRI Control" />
		<link rel="apple-touch-icon" href="/icon-192.png" />
		
		<!-- Android PWA Configuration -->
		<meta name="mobile-web-app-capable" content="yes" />
		
		<!-- App Description -->
		<meta name="description" content="Professional ARRI camera control via CAP protocol. Control frame rate, white balance, ISO, playback, timecode, and color grading from your mobile device." />
		<meta name="keywords" content="ARRI, camera control, CAP protocol, professional video, cinematography" />
		
		<!-- Open Graph -->
		<meta property="og:title" content="ARRI Camera Control" />
		<meta property="og:description" content="Professional camera control via CAP protocol" />
		<meta property="og:type" content="website" />
		<meta property="og:image" content="/icon-512.png" />
		
		<title>ARRI Camera Control</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-arri-dark text-white">
		<div style="display: contents">%sveltekit.body%</div>
		
		<!-- Mobile App Initialization -->
		<script>
			// Initialize mobile app if running in Capacitor
			if (window.Capacitor) {
				console.log('Running in Capacitor mobile app');
				
				// Import and initialize mobile adapter for offline-first architecture
				import('/src/lib/mobile/mobile-adapter.js').then(({ mobileAdapter }) => {
					mobileAdapter.initialize().then((success) => {
						if (success) {
							console.log('Mobile app initialized successfully');
						} else {
							console.error('Mobile app initialization failed');
						}
					}).catch(console.error);
				});
			} else {
				console.log('Running in web browser');
				
				// For web platforms, still initialize the mobile adapter for offline functionality
				import('/src/lib/mobile/mobile-adapter.js').then(({ mobileAdapter }) => {
					mobileAdapter.initialize().catch(console.error);
				});
			}
		</script>
	</body>
</html>
